<html lang="pt-BR">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta property="og:title" content="Gerenciador SG Multimídia"/>
    <meta property="og:description" content="Sistema de gestão audiovisual profissional"/>
    <meta property="og:image" content="/logo-512.png" type="image/png"/>
    <meta property="og:type" content="website"/>
    <meta property="og:site_name" content="SG Multimídia"/>
    <link rel="shortcut icon" href="/logo-192.png" type="image/png"/>
    <link rel="apple-touch-icon" sizes="180x180" href="/logo-192.png" type="image/png"/>
    <link rel="manifest" href="/manifest.json"/>
    <meta name="theme-color" content="#0f172a"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
    <meta name="apple-mobile-web-app-title" content="SG Multimídia"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <title>SG Multimídia</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/react-app/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
